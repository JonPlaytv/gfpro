<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Partner</title>
  </head>
  <body>
    <div id="app">
      <canvas id="vrm-canvas"></canvas>
      
      <!-- Chat Interface -->
      <div class="chat-wrapper">
        <div class="chat-response hidden" id="chat-response">
          <div class="chat-response-text" id="chat-response-text"></div>
        </div>
        <div class="chat-container">
          <input type="text" class="chat-input" id="chat-input" placeholder="Talk to your AI Partner..." autocomplete="off" />
          <button class="chat-submit" id="chat-submit">Send</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
